<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSViaCEP</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="nav-container">
        <nav class="nav-main">
            <h1>DSViaCEP</h1>
            <div class="contact-link">contato</div>
        </nav>
    </header>
    <main>
        <section id="form-section" class="form-container">
            <div class="card-form">
                <form name="newAddress" action="">
                    <div>
                        <label for="cep">CEP:</label>
                        <input name="cep" id="cep" placeholder="CEP" type="text">
                    </div>
                    <div>
                        <label for="street">Logradouro:</label>
                        <input name="street" id="street" placeholder="Logradouro" type="text">
                    </div>
                    <div>
                        <label for="number">Número:</label>
                        <input name="number" id="number" placeholder="Número" type="text">
                    </div>
                    <div>
                        <label for="city">Cidade:</label>
                        <input name="city" id="city" placeholder="Cidade" type="text">
                    </div>
                    <div>
                        <button type="submit">Salvar</button>
                        <button>Limpar</button>
                    </div>
                </form>
            </div>

        </section>
        <section id="list-section">
            <div>
                <h3>São Paulo</h3>
                <p>Rua dos Jardins, 720</p>
                <p>11200-345</p>
            </div>
            <div>
                <h3>São Paulo</h3>
                <p>Rua dos Jardins, 720</p>
                <p>11200-345</p>
            </div>
        </section>
    </main>
</body>
</html>
